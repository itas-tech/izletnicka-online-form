[build]
  publish = "."

[[redirects]]
  from = "/payment/public-result/*"
  to = "/payment/public-result/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
